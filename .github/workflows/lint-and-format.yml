name: Lint and Format Check

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  lint-and-format:
    name: ESLint & Prettier Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier check
        id: prettier-check
        run: |
          set -o pipefail
          npm run format:check 2>&1 | tee prettier-output.txt
        continue-on-error: true

      - name: Run ESLint (JSON report)
        id: eslint-check
        run: |
          npx eslint . --ext .js,.jsx,.ts,.tsx -f json -o eslint-report.json
        continue-on-error: true

      - name: Compute counts
        id: counts
        if: always()
        run: |
          node <<'NODE'
          const fs = require('fs');

          const eslintReportPath = 'eslint-report.json';
          let eslintErrors = 0;
          let eslintWarnings = 0;

          try {
            const raw = fs.readFileSync(eslintReportPath, 'utf8');
            const report = JSON.parse(raw);
            if (Array.isArray(report)) {
              for (const file of report) {
                eslintErrors += Number(file?.errorCount || 0);
                eslintWarnings += Number(file?.warningCount || 0);
              }
            }
          } catch {
            // If ESLint crashes, keep counts at 0 and rely on step outcome.
          }

          const prettierOutputPath = 'prettier-output.txt';
          let prettierProblemFiles = 0;
          try {
            const out = fs.readFileSync(prettierOutputPath, 'utf8');
            const lines = out.split(/\r?\n/);
            const fileLines = lines
              .map((l) => l.trim())
              .filter((l) => l.startsWith('[warn]'))
              .filter((l) => !l.includes('Code style issues'))
              .filter((l) => !l.includes('Checking formatting'))
              .filter((l) => !l.includes('All matched files use Prettier'));
            const files = new Set(
              fileLines
                .map((l) => l.replace(/^\[warn\]\s+/, '').trim())
                .filter(Boolean)
            );
            prettierProblemFiles = files.size;
          } catch {
            // ignore
          }

          const outPath = process.env.GITHUB_OUTPUT;
          fs.appendFileSync(outPath, `eslint_errors=${eslintErrors}\n`);
          fs.appendFileSync(outPath, `eslint_warnings=${eslintWarnings}\n`);
          fs.appendFileSync(outPath, `prettier_problem_files=${prettierProblemFiles}\n`);
          NODE

      - name: Post PR summary comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- eventy-lint-format-summary -->';

            const prettierOutcome = '${{ steps.prettier-check.outcome }}';
            const eslintOutcome = '${{ steps.eslint-check.outcome }}';

            const prettierProblemFiles = Number('${{ steps.counts.outputs.prettier_problem_files }}' || 0);
            const eslintErrors = Number('${{ steps.counts.outputs.eslint_errors }}' || 0);
            const eslintWarnings = Number('${{ steps.counts.outputs.eslint_warnings }}' || 0);

            const prettierStatus = prettierOutcome === 'failure' ? '❌ Failed' : '✅ Passed';
            const eslintStatus = eslintOutcome === 'failure' ? '❌ Failed' : '✅ Passed';

            const body = [
              marker,
              '### Lint & Format summary',
              '',
              `- **Prettier**: ${prettierStatus}${prettierOutcome === 'failure' ? ` (${prettierProblemFiles} file(s))` : ''}`,
              `- **ESLint**: ${eslintStatus} (${eslintErrors} error(s), ${eslintWarnings} warning(s))`,
              '',
              'How to fix locally:',
              '- `npm run format`',
              '- `npm run lint`',
              '- `npm run lint:fix` (optional)',
              '',
              'Notes:',
              '- The workflow fails on **Prettier issues** and **ESLint errors**.',
              '- ESLint warnings do **not** fail CI, but are reported here.',
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (c) => c?.user?.type === 'Bot' && typeof c.body === 'string' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Summary - Check results
        if: always()
        run: |
          echo "### Lint and Format Check Results" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.prettier-check.outcome }}" == "failure" ]; then
            echo "❌ **Prettier Check**: Failed" >> $GITHUB_STEP_SUMMARY
            echo "Run \`npm run format\` to fix formatting issues." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **Prettier Check**: Passed" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.eslint-check.outcome }}" == "failure" ]; then
            echo "❌ **ESLint**: Failed" >> $GITHUB_STEP_SUMMARY
            echo "Run \`npm run lint\` to see errors.\n" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **ESLint**: Passed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Counts**" >> $GITHUB_STEP_SUMMARY
          echo "- ESLint errors: ${{ steps.counts.outputs.eslint_errors }}" >> $GITHUB_STEP_SUMMARY
          echo "- ESLint warnings: ${{ steps.counts.outputs.eslint_warnings }}" >> $GITHUB_STEP_SUMMARY
          echo "- Prettier files with issues: ${{ steps.counts.outputs.prettier_problem_files }}" >> $GITHUB_STEP_SUMMARY
          
      - name: Fail if issues found
        if: steps.prettier-check.outcome == 'failure' || steps.eslint-check.outcome == 'failure'
        run: |
          echo "::error::Lint/format issues found. Run 'npm run format' and/or 'npm run lint' to fix."
          exit 1
