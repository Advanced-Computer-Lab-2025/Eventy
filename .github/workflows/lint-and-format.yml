name: Lint and Format Check

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  lint-and-format:
    name: ESLint & Prettier Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier check
        id: prettier-check
        run: npm run format:check
        continue-on-error: true

      - name: Run ESLint
        id: eslint-check
        run: npm run lint
        continue-on-error: true

      - name: Run ESLint with Reviewdog
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-eslint@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          level: warning
          eslint_flags: '.'

      - name: Summary - Check results
        if: always()
        run: |
          echo "### Lint and Format Check Results" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.prettier-check.outcome }}" == "failure" ]; then
            echo "❌ **Prettier Check**: Failed" >> $GITHUB_STEP_SUMMARY
            echo "Run \`npm run format\` to fix formatting issues." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **Prettier Check**: Passed" >> $GITHUB_STEP_SUMMARY
          fi
          
      - name: Fail if issues found
        if: steps.prettier-check.outcome == 'failure'
        run: |
          echo "::error::Formatting issues found. Run 'npm run format' to fix."
          exit 1
