name: Lint and Format Check

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  lint-and-format:
    name: ESLint & Prettier Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier check
        id: prettier-check
        run: npm run format:check
        continue-on-error: true

      - name: Run ESLint
        id: eslint-check
        run: npm run lint
        continue-on-error: true

      - name: Run ESLint with Reviewdog
        uses: reviewdog/action-eslint@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          eslint_flags: "."
          fail_on_error: false
          filter_mode: nofilter

      - name: Check results and fail if needed
        if: steps.prettier-check.outcome == 'failure' || steps.eslint-check.outcome == 'failure'
        run: |
          echo "::error::Formatting or linting issues found"
          if [ "${{ steps.prettier-check.outcome }}" == "failure" ]; then
            echo "::error::Prettier formatting check failed. Run 'npm run format' to fix."
          fi
          if [ "${{ steps.eslint-check.outcome }}" == "failure" ]; then
            echo "::error::ESLint check failed. Run 'npm run lint:fix' to fix."
          fi
          exit 1
