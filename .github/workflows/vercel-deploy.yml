name: Deploy Frontend to Vercel

on:
  push:
    branches:
      - main
      - feat/azure-vercel-deployment
    paths: [
        "client/**",
        "package.json",
        "package-lock.json",
        "vercel.json",
        "client/vercel.json",
      ] # Added Vercel configs to trigger
  pull_request:
    branches:
      - main
      - feat/azure-vercel-deployment
    paths:
      [
        "client/**",
        "package.json",
        "package-lock.json",
        "vercel.json",
        "client/vercel.json",
      ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"
          # FIX: Point to the actual location of your lock file
          cache-dependency-path: "package-lock.json"

      - name: Install dependencies
        # FIX: Run in root because that's where package.json is
        run: npm install

      - name: Build frontend
        # If your build script is in the root package.json:
        run: npm run build
        # OR if you must run the build inside the client folder:
        # working-directory: ./client
        # run: npm run build

      - name: Choose Vercel deploy type
        id: vercel
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "args=--prod" >> $GITHUB_OUTPUT
          else
            echo "args=" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Vercel
        id: vercel_deploy
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./ # Usually root if package.json is there
          vercel-args: ${{ steps.vercel.outputs.args }}

      - name: Remove previous Vercel preview comment
        if: ${{ github.event_name == 'pull_request' && success() }}
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- vercel-preview-link -->";
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const toDelete = comments.filter(
              (c) => typeof c.body === "string" && c.body.includes(marker)
            );

            for (const c of toDelete) {
              await github.rest.issues.deleteComment({
                owner,
                repo,
                comment_id: c.id,
              });
            }

      - name: Setup reviewdog
        if: ${{ github.event_name == 'pull_request' && success() }}
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Comment Vercel preview link (reviewdog)
        if: ${{ github.event_name == 'pull_request' && success() }}
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREVIEW_URL: ${{ steps.vercel_deploy.outputs.preview-url }}
          DEPLOYMENT_URL: ${{ steps.vercel_deploy.outputs.deployment-url }}
          PROD_URL: ${{ steps.vercel_deploy.outputs.prod-url }}
        run: |
          set -euo pipefail

          URL="${PREVIEW_URL:-}"
          if [ -z "$URL" ]; then URL="${DEPLOYMENT_URL:-}"; fi
          if [ -z "$URL" ]; then URL="${PROD_URL:-}"; fi

          # If the action didn't provide a URL (e.g., secrets missing, deploy skipped), don't comment.
          if [ -z "$URL" ]; then
            echo "No Vercel URL output found; skipping comment."
            exit 0
          fi

          BODY=$(cat <<EOF
          <!-- vercel-preview-link -->
          ### Vercel Preview ✅
          - **Preview URL:** ${URL}
          - **Commit:** ${GITHUB_SHA}

          _This comment is posted automatically after a successful Vercel deployment._
          EOF
          )

          export BODY
          python3 - <<'PY' | reviewdog -f=rdjson -reporter=github-pr-review -filter-mode=nofilter -name="vercel-preview"
          import json
          import os

          body = os.environ.get("BODY", "")
          payload = {
            "source": {"name": "vercel-preview"},
            "diagnostics": [
              {
                "message": body,
                "location": {
                  "path": "README.md",
                  "range": {
                    "start": {"line": 1, "column": 1},
                    "end": {"line": 1, "column": 1},
                  },
                },
                "severity": "INFO",
              }
            ],
          }

          print(json.dumps(payload))
          PY
