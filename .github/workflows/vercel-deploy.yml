name: Deploy Frontend to Vercel

on:
  push:
    branches:
      - main
      - feat/azure-vercel-deployment
    paths: [
        "client/**",
        "package.json",
        "package-lock.json",
        "vercel.json",
        "client/vercel.json",
      ] # Added Vercel configs to trigger
  pull_request:
    branches:
      - main
      - feat/azure-vercel-deployment
    paths:
      [
        "client/**",
        "package.json",
        "package-lock.json",
        "vercel.json",
        "client/vercel.json",
      ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"
          # FIX: Point to the actual location of your lock file
          cache-dependency-path: "package-lock.json"

      - name: Install dependencies
        # FIX: Run in root because that's where package.json is
        run: npm install

      - name: Build frontend
        # If your build script is in the root package.json:
        run: npm run build
        # OR if you must run the build inside the client folder:
        # working-directory: ./client
        # run: npm run build

      - name: Choose Vercel deploy type
        id: vercel
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "args=--prod" >> $GITHUB_OUTPUT
          else
            echo "args=" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Vercel
        id: vercel_deploy
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./ # Usually root if package.json is there
          vercel-args: ${{ steps.vercel.outputs.args }}

      - name: Remove previous Vercel preview comment
        if: ${{ github.event_name == 'pull_request' && success() }}
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- vercel-preview-link -->";
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const toDelete = comments.filter(
              (c) => typeof c.body === "string" && c.body.includes(marker)
            );

            for (const c of toDelete) {
              await github.rest.issues.deleteComment({
                owner,
                repo,
                comment_id: c.id,
              });
            }

      - name: Comment Vercel preview link
        if: ${{ github.event_name == 'pull_request' && success() }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- vercel-preview-link -->';
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const previewUrl = '${{ steps.vercel_deploy.outputs.preview-url }}' || '';
            const deploymentUrl = '${{ steps.vercel_deploy.outputs.deployment-url }}' || '';
            const prodUrl = '${{ steps.vercel_deploy.outputs.prod-url }}' || '';

            const url = previewUrl || deploymentUrl || prodUrl;

            if (!url) {
              core.info('No Vercel URL output found; skipping comment.');
              return;
            }

            const body = [
              marker,
              '### Vercel Preview ✅',
              `- **Preview URL:** ${url}`,
              `- **Commit:** ${process.env.GITHUB_SHA}`,
              '',
              '_This comment is posted automatically after a successful Vercel deployment._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (c) => c?.user?.type === 'Bot' && typeof c.body === 'string' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
